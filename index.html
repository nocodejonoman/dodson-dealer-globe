<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodson Motorsport — Global Dealer Network</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-bright: #f0c060;
  --bg: #000408;
  --panel-bg: rgba(4, 12, 20, 0.93);
  --text: #d0dde8;
  --text-dim: #4a6070;
  --border: rgba(201, 168, 76, 0.2);
  --font-ui: 'Rajdhani', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-ui); }
canvas { display: block; }

/* Loading screen */
#loading {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.6s ease;
}
#loading.fade-out { opacity: 0; pointer-events: none; }
#loading img { height: 48px; margin-bottom: 24px; filter: brightness(1.2); }
#loading .load-text {
  font-family: var(--font-mono); font-size: 13px; color: var(--gold);
  letter-spacing: 3px;
}
#loading .dots span { animation: dotPulse 1.4s infinite; opacity: 0; }
#loading .dots span:nth-child(2) { animation-delay: 0.2s; }
#loading .dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse { 0%,80%,100%{opacity:0} 40%{opacity:1} }

/* Header */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px;
  background: linear-gradient(180deg, rgba(0,4,8,0.85) 0%, transparent 100%);
  pointer-events: none;
}
#header .brand { display: flex; align-items: center; gap: 14px; }
#header .brand img { height: 32px; filter: brightness(1.1); }
#header .brand-text .name {
  font-family: var(--font-ui); font-weight: 700; font-size: 16px;
  color: var(--gold); letter-spacing: 4px; text-transform: uppercase;
}
#header .brand-text .sub {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-dim); letter-spacing: 2px;
}
#header .stats {
  text-align: right; font-family: var(--font-mono); font-size: 12px;
}
#header .stats .label { color: var(--text-dim); }
#header .stats .value { color: var(--gold); }
#header .stats .clock { color: var(--text-dim); margin-top: 2px; font-size: 11px; }

/* Search bar */
#search-wrap {
  position: fixed; top: 70px; left: 24px; z-index: 200;
  display: flex; gap: 8px; align-items: center;
}
#search-input {
  width: 200px; padding: 8px 12px; padding-right: 30px;
  font-family: var(--font-mono); font-size: 12px;
  color: var(--text); background: var(--panel-bg);
  border: 1px solid var(--border); border-radius: 4px;
  outline: none; backdrop-filter: blur(10px);
  letter-spacing: 1px;
}
#search-input::placeholder { color: var(--text-dim); }
#search-input:focus { border-color: var(--gold); }
#search-clear {
  position: absolute; right: 78px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--text-dim);
  font-size: 14px; cursor: pointer; display: none; padding: 2px 6px;
}
#search-clear:hover { color: var(--text); }
#filter-toggle {
  font-family: var(--font-ui); font-weight: 600; font-size: 13px;
  color: var(--gold); background: var(--panel-bg);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 8px 16px; cursor: pointer; letter-spacing: 2px;
  backdrop-filter: blur(10px); transition: all 0.2s;
}
#filter-toggle:hover { border-color: var(--gold); background: rgba(201,168,76,0.1); }

#filter-panel {
  position: fixed; top: 106px; left: 24px; z-index: 200;
  width: 240px; background: var(--panel-bg);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 16px; backdrop-filter: blur(14px);
  display: none; max-height: calc(100vh - 140px); overflow-y: auto;
}
#filter-panel.open { display: block; }
#filter-panel h4 {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--text-dim); letter-spacing: 2px; margin-bottom: 8px;
  text-transform: uppercase;
}
#filter-panel .section { margin-bottom: 16px; }
#filter-panel label {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-ui); font-size: 13px; color: var(--text);
  cursor: pointer; padding: 3px 0;
}
#filter-panel label:hover { color: var(--gold); }
#filter-panel input[type="checkbox"] { accent-color: var(--gold); }
#filter-panel select {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: 4px;
  color: var(--text); font-family: var(--font-ui); font-size: 13px;
  padding: 6px 8px; cursor: pointer; outline: none;
}
#filter-panel select:focus { border-color: var(--gold); }
#filter-panel select option { background: #0a1628; color: var(--text); }
#reset-filters {
  width: 100%; padding: 8px;
  font-family: var(--font-ui); font-weight: 600; font-size: 12px;
  color: var(--gold); background: transparent;
  border: 1px solid var(--border); border-radius: 4px;
  cursor: pointer; letter-spacing: 2px; transition: all 0.2s;
}
#reset-filters:hover { background: rgba(201,168,76,0.15); border-color: var(--gold); }

/* Dealer info panel */
#dealer-panel {
  position: fixed; top: 50%; right: 20px; z-index: 300;
  transform: translateY(-50%) translateX(360px);
  width: 310px; background: var(--panel-bg);
  border-radius: 8px; padding: 24px;
  backdrop-filter: blur(14px);
  transition: transform 0.25s ease-out;
  border-left: 3px solid var(--gold);
  max-height: 80vh; overflow-y: auto;
}
#dealer-panel.open { transform: translateY(-50%) translateX(0); }
#dealer-panel .panel-head {
  display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;
}
#dealer-panel .tier-badge {
  font-family: var(--font-ui); font-weight: 600; font-size: 10px;
  padding: 3px 10px; border-radius: 12px; text-transform: uppercase;
  letter-spacing: 1px; color: #fff;
}
#dealer-panel .close-btn {
  background: none; border: none; color: var(--text-dim);
  font-size: 20px; cursor: pointer; line-height: 1; padding: 0 4px;
}
#dealer-panel .close-btn:hover { color: var(--text); }
#dealer-panel .dealer-name {
  font-family: var(--font-ui); font-weight: 700; font-size: 18px;
  color: #fff; margin-bottom: 4px;
}
#dealer-panel .dealer-city {
  font-family: var(--font-mono); font-size: 12px; color: var(--text-dim);
  margin-bottom: 14px;
}
#dealer-panel .divider { height: 1px; background: var(--border); margin: 14px 0; }
#dealer-panel .field-label {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-dim);
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px;
}
#dealer-panel .tier-display {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-ui); font-size: 14px; margin-bottom: 4px;
}
#dealer-panel .tier-dot { width: 8px; height: 8px; border-radius: 50%; }
#dealer-panel .platforms-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
#dealer-panel .plat-tag {
  font-family: var(--font-mono); font-size: 10px;
  background: rgba(201,168,76,0.12); color: var(--gold);
  padding: 3px 8px; border-radius: 10px;
}
#dealer-panel .contact-row {
  display: flex; align-items: flex-start; gap: 10px;
  font-family: var(--font-ui); font-size: 13px;
  margin-bottom: 8px; color: var(--text); word-break: break-word;
}
#dealer-panel .contact-row .icon { flex-shrink: 0; width: 16px; text-align: center; }
#dealer-panel .contact-row a { color: var(--gold); text-decoration: none; }
#dealer-panel .contact-row a:hover { text-decoration: underline; }
#dealer-panel .visit-btn {
  display: block; width: 100%; margin-top: 16px;
  padding: 10px; text-align: center;
  font-family: var(--font-ui); font-weight: 700; font-size: 13px;
  color: #0a0a0a; background: var(--gold);
  border: none; border-radius: 4px; cursor: pointer;
  letter-spacing: 2px; text-decoration: none; text-transform: uppercase;
  transition: background 0.2s;
}
#dealer-panel .visit-btn:hover { background: var(--gold-bright); }
#dealer-panel .map-btn {
  display: block; width: 100%; margin-top: 8px;
  padding: 10px; text-align: center;
  font-family: var(--font-ui); font-weight: 700; font-size: 13px;
  color: var(--gold); background: transparent;
  border: 1px solid var(--gold); border-radius: 4px; cursor: pointer;
  letter-spacing: 2px; text-transform: uppercase;
  transition: all 0.2s;
}
#dealer-panel .map-btn:hover { background: rgba(201,168,76,0.15); }

/* Full-screen map overlay */
#map-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,4,8,0.95);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
}
#map-overlay.open { display: flex; }
#map-overlay .map-header {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 28px;
  background: linear-gradient(180deg, rgba(0,4,8,0.95) 0%, transparent 100%);
}
#map-overlay .map-title {
  font-family: var(--font-ui); font-weight: 700; font-size: 16px;
  color: #fff; letter-spacing: 1px;
}
#map-overlay .map-subtitle {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-dim); letter-spacing: 1px;
}
#map-overlay .map-close {
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--text-dim); font-size: 14px; cursor: pointer;
  padding: 6px 14px; font-family: var(--font-ui); font-weight: 600;
  letter-spacing: 1px; transition: all 0.2s;
}
#map-overlay .map-close:hover { color: var(--gold); border-color: var(--gold); }
#map-overlay .map-frame {
  width: 90vw; height: 75vh;
  border-radius: 8px; overflow: hidden;
  border: 1px solid var(--border);
  margin-top: 60px;
}
#map-overlay .map-frame iframe { width: 100%; height: 100%; border: 0; }
#map-overlay .map-link {
  margin-top: 12px;
  font-family: var(--font-mono); font-size: 11px;
  color: var(--gold); text-decoration: none; letter-spacing: 1px;
}
#map-overlay .map-link:hover { text-decoration: underline; }

/* Cluster mini-list panel */
#cluster-panel {
  position: fixed; top: 50%; right: 20px; z-index: 300;
  transform: translateY(-50%) translateX(360px);
  width: 280px; background: var(--panel-bg);
  border-radius: 8px; padding: 20px;
  backdrop-filter: blur(14px);
  transition: transform 0.25s ease-out;
  border-left: 3px solid var(--gold);
  max-height: 60vh; overflow-y: auto;
}
#cluster-panel.open { transform: translateY(-50%) translateX(0); }
#cluster-panel .cluster-head {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
}
#cluster-panel .cluster-title {
  font-family: var(--font-ui); font-weight: 700; font-size: 14px;
  color: var(--gold); letter-spacing: 1px;
}
#cluster-panel .close-btn {
  background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer;
}
#cluster-panel .dealer-item {
  padding: 8px 10px; margin-bottom: 4px; border-radius: 4px; cursor: pointer;
  font-family: var(--font-ui); font-size: 13px; color: var(--text);
  transition: background 0.15s; display: flex; align-items: center; gap: 8px;
}
#cluster-panel .dealer-item:hover { background: rgba(201,168,76,0.12); color: var(--gold); }
#cluster-panel .dealer-item .tier-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
#cluster-panel .dealer-item .item-city { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }

/* Legend */
#legend {
  position: fixed; bottom: 20px; left: 24px; z-index: 100;
  background: var(--panel-bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 12px 16px; backdrop-filter: blur(10px);
}
#legend .legend-item {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 11px; color: var(--text);
  padding: 3px 0; cursor: pointer; transition: opacity 0.2s;
}
#legend .legend-item:hover { color: var(--gold); }
#legend .legend-item.dimmed { opacity: 0.3; }

/* Tooltip */
#tooltip {
  position: fixed; z-index: 400;
  font-family: var(--font-ui); font-size: 12px;
  background: rgba(4,12,20,0.95); color: var(--text);
  padding: 8px 14px; border-radius: 4px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--gold);
  pointer-events: none; opacity: 0;
  transition: opacity 0.15s; white-space: nowrap;
  line-height: 1.4;
}
#tooltip.visible { opacity: 1; }
#tooltip .tt-name { font-weight: 600; color: #fff; }
#tooltip .tt-sub { font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); }

/* Empty state */
#empty-state {
  position: fixed; top: 50%; left: 50%; z-index: 50;
  transform: translate(-50%, -50%);
  font-family: var(--font-mono); font-size: 14px;
  color: var(--text-dim); letter-spacing: 2px;
  display: none; text-align: center;
}

/* Keyboard hints */
#kbd-hints {
  position: fixed; bottom: 20px; right: 24px; z-index: 100;
  font-family: var(--font-mono); font-size: 10px; color: var(--text-dim);
  letter-spacing: 1px; text-align: right; line-height: 1.8;
  opacity: 0.5;
}
#kbd-hints kbd {
  display: inline-block; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 3px;
  padding: 1px 5px; font-family: var(--font-mono); font-size: 9px;
  color: var(--text-dim);
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Mobile */
@media (max-width: 768px) {
  #header .brand-text .name { font-size: 13px; letter-spacing: 2px; }
  #header .stats { font-size: 10px; }
  #search-input { width: 140px; }
  #dealer-panel, #cluster-panel {
    top: auto; bottom: 0; right: 0; left: 0;
    width: 100%; max-height: 50vh;
    transform: translateY(100%); border-radius: 12px 12px 0 0;
    border-left: none; border-top: 3px solid var(--gold);
  }
  #dealer-panel.open, #cluster-panel.open { transform: translateY(0); }
  #filter-panel { width: calc(100% - 48px); }
  #kbd-hints { display: none; }
}
</style>
</head>
<body>

<div id="loading">
  <img src="./dodson-logo.png" alt="Dodson">
  <div class="load-text">LOADING DEALER NETWORK<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
</div>

<div id="header">
  <div class="brand">
    <img src="./dodson-logo.png" alt="Dodson Motorsport">
    <div class="brand-text">
      <div class="name">DODSON MOTORSPORT</div>
      <div class="sub">GLOBAL DEALER NETWORK</div>
    </div>
  </div>
  <div class="stats">
    <div><span class="label">DEALERS // </span><span class="value" id="total-count">0</span></div>
    <div><span class="label">SHOWING // </span><span class="value" id="showing-count">0</span></div>
    <div class="clock" id="clock"></div>
  </div>
</div>

<div id="search-wrap">
  <input type="text" id="search-input" placeholder="SEARCH DEALERS...">
  <button id="search-clear">&times;</button>
  <button id="filter-toggle">FILTER DEALERS &#9662;</button>
</div>

<div id="filter-panel">
  <div class="section">
    <h4>DEALER TIER</h4>
    <label><input type="checkbox" class="tier-filter" value="Distributor" checked> Distributor</label>
    <label><input type="checkbox" class="tier-filter" value="Pro Dealer" checked> Pro Dealer</label>
    <label><input type="checkbox" class="tier-filter" value="Dealer Plus" checked> Dealer Plus</label>
    <label><input type="checkbox" class="tier-filter" value="Standard" checked> Standard</label>
  </div>
  <div class="section">
    <h4>COUNTRY</h4>
    <select id="country-filter"><option value="">All Countries</option></select>
  </div>
  <div class="section">
    <h4>PLATFORM</h4>
    <select id="platform-filter">
      <option value="">All Platforms</option>
      <option>BMW 8HP</option>
      <option>BMW 8HP51</option>
      <option>BMW 8HP76</option>
      <option>Corvette C8</option>
      <option>Ferrari</option>
      <option>Ford Mustang GT500</option>
      <option>Lamborghini Hurac&aacute;n / Audi R8</option>
      <option>McLaren</option>
      <option>Mercedes-AMG GT</option>
      <option>Mitsubishi EVO X</option>
      <option>Nissan GT-R R35</option>
      <option>Porsche PDK</option>
      <option>Toyota GR Supra A90</option>
      <option>VW/Audi DSG</option>
    </select>
  </div>
  <button id="reset-filters">RESET FILTERS</button>
</div>

<div id="dealer-panel">
  <div class="panel-head">
    <span class="tier-badge" id="dp-tier-badge"></span>
    <button class="close-btn" id="dp-close">&times;</button>
  </div>
  <div class="dealer-name" id="dp-name"></div>
  <div class="dealer-city" id="dp-city"></div>
  <div class="divider"></div>
  <div class="field-label">TIER</div>
  <div class="tier-display"><span class="tier-dot" id="dp-tier-dot"></span><span id="dp-tier-text"></span></div>
  <div class="divider"></div>
  <div class="field-label">PLATFORMS</div>
  <div class="platforms-list" id="dp-platforms"></div>
  <div class="divider"></div>
  <div id="dp-contact"></div>
  <a class="visit-btn" id="dp-website" href="#" target="_blank" rel="noopener">VISIT WEBSITE &rarr;</a>
  <button class="map-btn" id="dp-map-btn">&#128205; VIEW ON STREET MAP</button>
</div>

<div id="cluster-panel">
  <div class="cluster-head">
    <span class="cluster-title" id="cp-title"></span>
    <button class="close-btn" id="cp-close">&times;</button>
  </div>
  <div id="cp-list"></div>
</div>

<div id="legend">
  <div class="legend-item" data-tier="Distributor"><span style="background:#e8f0ff;width:8px;height:8px;border-radius:50%;display:inline-block"></span> Distributor</div>
  <div class="legend-item" data-tier="Pro Dealer"><span style="background:#c9a84c;width:8px;height:8px;border-radius:50%;display:inline-block"></span> Pro Dealer</div>
  <div class="legend-item" data-tier="Dealer Plus"><span style="background:#1a8fff;width:8px;height:8px;border-radius:50%;display:inline-block"></span> Dealer Plus</div>
  <div class="legend-item" data-tier="Standard"><span style="background:#2a9d8f;width:8px;height:8px;border-radius:50%;display:inline-block"></span> Standard</div>
</div>

<div id="tooltip"></div>
<div id="empty-state">NO DEALERS MATCH YOUR FILTERS</div>

<div id="kbd-hints">
  <kbd>/</kbd> Search &nbsp; <kbd>F</kbd> Filter &nbsp; <kbd>Esc</kbd> Close &nbsp; <kbd>R</kbd> Reset
</div>

<div id="map-overlay">
  <div class="map-header">
    <div>
      <div class="map-title" id="map-title"></div>
      <div class="map-subtitle" id="map-subtitle"></div>
    </div>
    <button class="map-close" id="map-close">CLOSE MAP</button>
  </div>
  <div class="map-frame" id="map-frame"></div>
  <a class="map-link" id="map-link" href="#" target="_blank" rel="noopener">Open in OpenStreetMap &rarr;</a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="dealers.js"></script>
<script>
(function() {
'use strict';

const TIER_COLORS = {
  'Distributor':  { hex: 0xe8f0ff, css: '#e8f0ff', priority: 4 },
  'Pro Dealer':   { hex: 0xc9a84c, css: '#c9a84c', priority: 3 },
  'Dealer Plus':  { hex: 0x1a8fff, css: '#1a8fff', priority: 2 },
  'Standard':     { hex: 0x2a9d8f, css: '#2a9d8f', priority: 1 }
};

const GLOBE_R = 2.0;
const PIN_R = 2.015;
const DOT_SZ = 0.035;
const CAM_MIN = 3.0, CAM_MAX = 9.0, CAM_DEF = 5.5;
const ROTATE_SPD = 0.0006;
const ROTATE_DELAY = 2500;

// ── Scene ──
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
camera.position.z = CAM_MAX; // Start far for intro zoom

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000408);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x334466, 1.2));
const sunLight = new THREE.DirectionalLight(0xaaccee, 0.4);
sunLight.position.set(5, 3, 5);
scene.add(sunLight);
const backLight = new THREE.DirectionalLight(0x223344, 0.3);
backLight.position.set(-3, -2, -5);
scene.add(backLight);
const rimLight = new THREE.DirectionalLight(0x4488ff, 0.35);
rimLight.position.set(-5, 0, -3);
scene.add(rimLight);

const globeGroup = new THREE.Group();
scene.add(globeGroup);

// ── Stars ──
const starVerts = [];
for (let i = 0; i < 400; i++) {
  const t = Math.random() * Math.PI * 2;
  const p = Math.acos(2 * Math.random() - 1);
  const r = 40 + Math.random() * 20;
  starVerts.push(r*Math.sin(p)*Math.cos(t), r*Math.cos(p), r*Math.sin(p)*Math.sin(t));
}
const starGeom = new THREE.BufferGeometry();
starGeom.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
scene.add(new THREE.Points(starGeom, new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, sizeAttenuation: true, transparent: true, opacity: 0.7 })));

// ── Dot Textures (shared per tier) ──
const DOT_TEXTURES = {};
function getDotTexture(tierKey) {
  if (DOT_TEXTURES[tierKey]) return DOT_TEXTURES[tierKey];
  const tc = TIER_COLORS[tierKey] || TIER_COLORS['Standard'];
  const cv = document.createElement('canvas');
  cv.width = 64; cv.height = 64;
  const cx = cv.getContext('2d');
  // Outer glow
  const grad = cx.createRadialGradient(32, 32, 10, 32, 32, 30);
  grad.addColorStop(0, tc.css);
  grad.addColorStop(0.5, tc.css + 'aa');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  cx.fillStyle = grad;
  cx.fillRect(0, 0, 64, 64);
  // Solid center
  cx.beginPath(); cx.arc(32, 32, 14, 0, Math.PI * 2);
  cx.fillStyle = tc.css; cx.fill();
  // White highlight
  cx.beginPath(); cx.arc(32, 32, 5, 0, Math.PI * 2);
  cx.fillStyle = 'rgba(255,255,255,0.5)'; cx.fill();
  const tex = new THREE.CanvasTexture(cv);
  DOT_TEXTURES[tierKey] = tex;
  return tex;
}

// ── Sun Position (for day/night terminator) ──
function getSunDirection() {
  const now = new Date();
  const JD = now.getTime() / 86400000 + 2440587.5;
  const D = JD - 2451545.0;
  const g = (357.529 + 0.98560028 * D) % 360;
  const gRad = g * Math.PI / 180;
  const q = (280.459 + 0.98564736 * D) % 360;
  const L = q + 1.915 * Math.sin(gRad) + 0.020 * Math.sin(2 * gRad);
  const LRad = L * Math.PI / 180;
  const e = (23.439 - 0.00000036 * D) * Math.PI / 180;
  const dec = Math.asin(Math.sin(e) * Math.sin(LRad));
  const RA = Math.atan2(Math.cos(e) * Math.sin(LRad), Math.cos(LRad));
  const GMST = ((280.46061837 + 360.98564736629 * D) % 360) * Math.PI / 180;
  const sunLng = RA - GMST;
  return new THREE.Vector3(
    -Math.cos(dec) * Math.cos(sunLng),
    Math.sin(dec),
    Math.cos(dec) * Math.sin(sunLng)
  ).normalize();
}

// ── Earth ──
const tl = new THREE.TextureLoader();
let cloudMesh = null;
let terminatorMesh = null;

function createTerminator() {
  const vsh = `
    varying vec3 vWorldPos;
    void main() {
      vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `;
  const fsh = `
    uniform vec3 uSunDir;
    varying vec3 vWorldPos;
    void main() {
      vec3 wn = normalize(vWorldPos);
      float sunDot = dot(wn, uSunDir);
      float shadow = 1.0 - smoothstep(-0.15, 0.15, sunDot);
      vec3 nightTint = vec3(0.01, 0.02, 0.06);
      vec3 dayTint = vec3(0.55, 0.50, 0.38);
      float nightAlpha = shadow * 0.25;
      float dayAlpha = (1.0 - shadow) * 0.05;
      vec3 color = mix(dayTint, nightTint, shadow);
      float alpha = mix(dayAlpha, nightAlpha, shadow);
      gl_FragColor = vec4(color, alpha);
    }
  `;
  terminatorMesh = new THREE.Mesh(
    new THREE.SphereGeometry(2.005, 64, 64),
    new THREE.ShaderMaterial({
      vertexShader: vsh, fragmentShader: fsh,
      uniforms: { uSunDir: { value: getSunDirection() } },
      transparent: true, depthWrite: false, side: THREE.FrontSide
    })
  );
  globeGroup.add(terminatorMesh);
}

function buildGlobe(tex) {
  const mat = tex
    ? new THREE.MeshPhongMaterial({ map: tex, emissiveMap: tex, emissive: 0xffffff, emissiveIntensity: 0.6 })
    : new THREE.MeshPhongMaterial({ color: 0x0a1628 });
  globeGroup.add(new THREE.Mesh(new THREE.SphereGeometry(GLOBE_R, 64, 64), mat));
  globeGroup.add(new THREE.Mesh(
    new THREE.SphereGeometry(2.08, 64, 64),
    new THREE.MeshPhongMaterial({ color: 0x3366ff, transparent: true, opacity: 0.12, side: THREE.BackSide })
  ));
  // Outer atmospheric glow
  globeGroup.add(new THREE.Mesh(
    new THREE.SphereGeometry(2.18, 64, 64),
    new THREE.MeshPhongMaterial({ color: 0x2255cc, transparent: true, opacity: 0.06, side: THREE.BackSide })
  ));
  createTerminator();
  tl.load('https://unpkg.com/three-globe/example/img/earth-clouds.png', ct => {
    cloudMesh = new THREE.Mesh(
      new THREE.SphereGeometry(2.04, 64, 64),
      new THREE.MeshPhongMaterial({ map: ct, transparent: true, opacity: 0.15, side: THREE.DoubleSide, depthWrite: false })
    );
    globeGroup.add(cloudMesh);
  }, undefined, () => {});
  init();
}

tl.load('https://unpkg.com/three-globe/example/img/earth-night.jpg',
  t => buildGlobe(t), undefined,
  () => buildGlobe(null)
);

// ── Helpers ──
function ll2v(lat, lng, r) {
  r = r || PIN_R;
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -(r * Math.sin(phi) * Math.cos(theta)),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta)
  );
}

function angDist(a, b) {
  const R = Math.PI / 180;
  const dLat = (b.lat - a.lat) * R;
  const dLng = (b.lng - a.lng) * R;
  const x = Math.sin(dLat/2)**2 + Math.cos(a.lat*R) * Math.cos(b.lat*R) * Math.sin(dLng/2)**2;
  return 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x)) * 180 / Math.PI;
}

function getCountry(city) {
  const parts = city.split(',').map(s => s.trim());
  let c = parts[parts.length - 1] || parts[0];
  c = c.replace(/BT28 2BP/g, '').replace(/07 66 37 61 80/g, '').trim();
  if (!c || /^\d/.test(c)) c = parts.length > 1 ? parts[parts.length - 2] : city;
  const norm = {
    'Arizona':'United States','Minnesota':'United States','Pennsylvania':'United States',
    'Texas':'United States','Ohio':'United States','Florida':'United States',
    'Connecticut':'United States','New York':'United States','New Jersey':'United States',
    'Indiana':'United States','Scotland':'United Kingdom','Queensland':'Australia',
    'Republic of Korea':'South Korea'
  };
  return norm[c] || c;
}

function easeIO(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function escH(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Prepare data ──
const valid = DEALERS.filter(d => d.lat != null && d.lng != null);
valid.forEach(d => { d._country = getCountry(d.city); });

document.getElementById('total-count').textContent = DEALERS.length;

const countries = [...new Set(valid.map(d => d._country))].sort();

// ── Pin system ──
const pinGroup = new THREE.Group();
globeGroup.add(pinGroup);

let pins = [];
let clusters = [];
let visible = [...valid];
let searchQuery = '';

function makePin(d) {
  const tc = TIER_COLORS[d.tier] || TIER_COLORS['Standard'];
  const pos = ll2v(d.lat, d.lng);

  const sp = new THREE.Sprite(new THREE.SpriteMaterial({
    map: getDotTexture(d.tier),
    transparent: true, depthTest: true, sizeAttenuation: true, opacity: 0.95
  }));
  sp.position.copy(pos);
  sp.scale.set(DOT_SZ, DOT_SZ, 1);
  sp.userData = { dealer: d, type: 'pin', phase: Math.random() * Math.PI * 2, _hovered: false };
  sp.renderOrder = tc.priority;

  // Spike line
  const surfPos = ll2v(d.lat, d.lng, GLOBE_R);
  const sg = new THREE.BufferGeometry().setFromPoints([surfPos, pos]);
  const spike = new THREE.Line(sg, new THREE.LineBasicMaterial({ color: tc.hex, transparent: true, opacity: 0.25 }));

  return { mesh: sp, spike, dealer: d };
}

function makeCluster(group, lat, lng) {
  const n = group.length;
  const best = group.reduce((b, d) => {
    const p = (TIER_COLORS[d.tier] || TIER_COLORS['Standard']).priority;
    return p > b.p ? { t: d.tier, p } : b;
  }, { t: 'Standard', p: 0 });
  const tc = TIER_COLORS[best.t];
  const sz = n <= 5 ? 0.07 : n <= 15 ? 0.1 : 0.13;

  const cv = document.createElement('canvas');
  cv.width = 64; cv.height = 64;
  const cx = cv.getContext('2d');
  cx.beginPath(); cx.arc(32, 32, 28, 0, Math.PI * 2);
  cx.fillStyle = 'rgba(255,255,255,0.9)'; cx.fill();
  cx.lineWidth = 3; cx.strokeStyle = tc.css; cx.stroke();
  cx.fillStyle = '#0a0a0a';
  cx.font = 'bold 24px sans-serif';
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillText(String(n), 32, 33);

  const tx = new THREE.CanvasTexture(cv);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tx, transparent: true, depthTest: true, sizeAttenuation: true }));
  const pos = ll2v(lat, lng, PIN_R + 0.02);
  sp.position.copy(pos);
  sp.scale.set(sz, sz, 1);
  sp.userData = { dealers: group, type: 'cluster', phase: Math.random() * Math.PI * 2, bs: sz };
  sp.renderOrder = 10;

  return { mesh: sp, dealers: group, lat, lng };
}

function computeClusters(arr, thresh) {
  if (!arr.length) return { singles: [], groups: [] };
  const used = new Uint8Array(arr.length);
  const groups = [], singles = [];
  for (let i = 0; i < arr.length; i++) {
    if (used[i]) continue;
    const grp = [arr[i]]; used[i] = 1;
    for (let j = i + 1; j < arr.length; j++) {
      if (used[j]) continue;
      for (const m of grp) {
        if (angDist(m, arr[j]) < thresh) { grp.push(arr[j]); used[j] = 1; break; }
      }
    }
    if (grp.length >= 2) groups.push(grp); else singles.push(grp[0]);
  }
  return { singles, groups };
}

function getThreshold() {
  const d = camera.position.length();
  if (d < 4.5) return 0;
  if (d <= 6.5) return 4;
  return 7;
}

function rebuild() {
  while (pinGroup.children.length) pinGroup.remove(pinGroup.children[0]);
  pins = []; clusters = [];

  const th = getThreshold();
  if (th === 0) {
    visible.forEach(d => { const p = makePin(d); pinGroup.add(p.mesh); pinGroup.add(p.spike); pins.push(p); });
  } else {
    const { singles, groups } = computeClusters(visible, th);
    singles.forEach(d => { const p = makePin(d); pinGroup.add(p.mesh); pinGroup.add(p.spike); pins.push(p); });
    groups.forEach(g => {
      const lat = g.reduce((s,d) => s+d.lat, 0) / g.length;
      const lng = g.reduce((s,d) => s+d.lng, 0) / g.length;
      const c = makeCluster(g, lat, lng);
      pinGroup.add(c.mesh); clusters.push(c);
    });
  }

  document.getElementById('showing-count').textContent = visible.length;
  document.getElementById('empty-state').style.display = visible.length === 0 ? 'block' : 'none';
}

// ── Filters ──
function applyFilters() {
  const tiers = new Set();
  document.querySelectorAll('.tier-filter').forEach(c => { if (c.checked) tiers.add(c.value); });
  const country = csel.value;
  const platform = document.getElementById('platform-filter').value;
  const q = searchQuery.toLowerCase();

  visible = valid.filter(d => {
    if (!tiers.has(d.tier)) return false;
    if (country && d._country !== country) return false;
    if (platform && !d.platforms.includes(platform)) return false;
    if (q && !d.name.toLowerCase().includes(q) && !d.city.toLowerCase().includes(q) && !d._country.toLowerCase().includes(q)) return false;
    return true;
  });

  rebuild();

  if (country && visible.length > 0) {
    const lat = visible.reduce((s,d) => s+d.lat, 0) / visible.length;
    const lng = visible.reduce((s,d) => s+d.lng, 0) / visible.length;
    animTo(lat, lng, 4.5);
  }

  // If search has exactly 1 result, fly to it and open panel
  if (q && visible.length === 1) {
    const d = visible[0];
    animTo(d.lat, d.lng, 4.0);
    setTimeout(() => showDealer(d), 600);
  }

  document.querySelectorAll('#legend .legend-item').forEach(el => {
    el.classList.toggle('dimmed', !tiers.has(el.dataset.tier));
  });
}

document.querySelectorAll('.tier-filter').forEach(c => c.addEventListener('change', applyFilters));
csel.addEventListener('change', applyFilters);
document.getElementById('platform-filter').addEventListener('change', applyFilters);
document.getElementById('reset-filters').addEventListener('click', () => {

});

// ── Camera animation ──
let camAnim = null;

function animTo(lat, lng, dist) {
  const tRotY = -((lng + 90) * Math.PI / 180);
  const tRotX = lat * Math.PI / 180;
  let dy = tRotY - globeGroup.rotation.y;
  while (dy > Math.PI) dy -= Math.PI * 2;
  while (dy < -Math.PI) dy += Math.PI * 2;

  camAnim = {
    sX: globeGroup.rotation.x, sY: globeGroup.rotation.y,
    tX: tRotX, tY: globeGroup.rotation.y + dy,
    sD: camera.position.z, tD: dist || camera.position.z,
    p: 0, dur: 1.0
  };
}

// ── Interaction ──
let drag = false, dragX = 0, dragY = 0, dragMoved = false;
let autoRot = true, rotTimer = null;
const mouse = new THREE.Vector2();
const ray = new THREE.Raycaster();
let hovered = null;
const tooltip = document.getElementById('tooltip');

function pDown(e) {
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  drag = true; dragX = cx; dragY = cy; dragMoved = false;
  autoRot = false;
  if (rotTimer) clearTimeout(rotTimer);
}

function pMove(e) {
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;

  if (drag) {
    const dx = cx - dragX, dy = cy - dragY;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragMoved = true;
    globeGroup.rotation.y += dx * 0.005;
    globeGroup.rotation.x += dy * 0.005;
    globeGroup.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, globeGroup.rotation.x));
    dragX = cx; dragY = cy;
    camAnim = null;
  }

  mouse.x = (cx / innerWidth) * 2 - 1;
  mouse.y = -(cy / innerHeight) * 2 + 1;

  ray.setFromCamera(mouse, camera);
  let hit = null;
  const ch = ray.intersectObjects(clusters.map(c => c.mesh), false);
  if (ch.length) hit = ch[0].object;
  if (!hit) { const ph = ray.intersectObjects(pins.map(p => p.mesh), false); if (ph.length) hit = ph[0].object; }

  if (hit && hit !== hovered) {
    // Unhover previous
    if (hovered && hovered.userData.type === 'pin') {
      hovered.userData._hovered = false;
      hovered.material.opacity = 0.95;
    }
    hovered = hit;
    renderer.domElement.style.cursor = 'pointer';
    // Hover new
    if (hit.userData.type === 'pin') {
      hit.userData._hovered = true;
      hit.material.opacity = 1.0;
    }
    const ud = hit.userData;
    if (ud.type === 'cluster') {
      tooltip.innerHTML = '<div class="tt-name">' + ud.dealers.length + ' dealers</div><div class="tt-sub">Click to expand</div>';
      tooltip.style.borderLeftColor = '#c9a84c';
    } else {
      const tc = TIER_COLORS[ud.dealer.tier] || TIER_COLORS['Standard'];
      tooltip.innerHTML = '<div class="tt-name">' + escH(ud.dealer.name) + '</div><div class="tt-sub">' + escH(ud.dealer.city) + '</div>';
      tooltip.style.borderLeftColor = tc.css;
    }
    tooltip.classList.add('visible');
  } else if (!hit && hovered) {
    if (hovered.userData.type === 'pin') {
      hovered.userData._hovered = false;
      hovered.material.opacity = 0.95;
    }
    hovered = null;
    renderer.domElement.style.cursor = 'default';
    tooltip.classList.remove('visible');
  }
  if (hovered) { tooltip.style.left = (cx + 14) + 'px'; tooltip.style.top = (cy - 10) + 'px'; }
}

function pUp() {
  drag = false;
  rotTimer = setTimeout(() => { autoRot = true; }, ROTATE_DELAY);
}

function onWheel(e) {
  e.preventDefault();
  camera.position.z = Math.max(CAM_MIN, Math.min(CAM_MAX, camera.position.z + e.deltaY * 0.005));
  clearTimeout(rbTimer);
  rbTimer = setTimeout(rebuild, 200);
}
let rbTimer;

// Pinch-to-zoom
let lastPinchDist = 0;
function onTouchMove(e) {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (lastPinchDist > 0) {
      const delta = (lastPinchDist - dist) * 0.01;
      camera.position.z = Math.max(CAM_MIN, Math.min(CAM_MAX, camera.position.z + delta));
      clearTimeout(rbTimer);
      rbTimer = setTimeout(rebuild, 200);
    }
    lastPinchDist = dist;
  } else {
    pMove(e);
  }
}
function onTouchEnd() {
  lastPinchDist = 0;
  pUp();
}

const cvs = renderer.domElement;
cvs.addEventListener('mousedown', pDown);
cvs.addEventListener('mousemove', pMove);
cvs.addEventListener('mouseup', pUp);
cvs.addEventListener('mouseleave', pUp);
cvs.addEventListener('touchstart', pDown, { passive: true });
cvs.addEventListener('touchmove', onTouchMove, { passive: true });
cvs.addEventListener('touchend', onTouchEnd);
cvs.addEventListener('wheel', onWheel, { passive: false });

cvs.addEventListener('click', e => {
  if (dragMoved) return; // Don't fire click after drag
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  ray.setFromCamera(mouse, camera);

  const ch = ray.intersectObjects(clusters.map(c => c.mesh), false);
  if (ch.length) {
    const ud = ch[0].object.userData;
    if (ud.dealers.length <= 5) { showCluster(ud.dealers); }
    else {
      const lat = ud.dealers.reduce((s,d) => s+d.lat, 0) / ud.dealers.length;
      const lng = ud.dealers.reduce((s,d) => s+d.lng, 0) / ud.dealers.length;
      camera.position.z = Math.max(CAM_MIN, camera.position.z - 2);
      animTo(lat, lng, camera.position.z);
      clearTimeout(rbTimer); rbTimer = setTimeout(rebuild, 200);
    }
    return;
  }

  const ph = ray.intersectObjects(pins.map(p => p.mesh), false);
  if (ph.length) { showDealer(ph[0].object.userData.dealer); return; }

  closePanels();
});

// ── Keyboard shortcuts ──
addEventListener('keydown', e => {
  // Don't intercept when typing in search
  if (document.activeElement === searchInput) {
    if (e.key === 'Escape') { searchInput.blur(); closePanels(); }
    return;
  }
  switch(e.key) {
    case 'Escape': closeMap(); closePanels(); document.getElementById('filter-panel').classList.remove('open'); break;
    case 'f': case 'F': e.preventDefault(); document.getElementById('filter-panel').classList.toggle('open'); break;
    case 'r': case 'R':
      camera.position.z = CAM_DEF; globeGroup.rotation.set(0, 0, 0); camAnim = null;
      document.querySelectorAll('.tier-filter').forEach(c => c.checked = true);
      csel.value = ''; document.getElementById('platform-filter').value = '';
      searchInput.value = ''; searchQuery = ''; searchClear.style.display = 'none';
      applyFilters(); closePanels(); break;
    case '/': e.preventDefault(); searchInput.focus(); break;
    case 'ArrowLeft': globeGroup.rotation.y -= 0.1; camAnim = null; autoRot = false; if(rotTimer)clearTimeout(rotTimer); rotTimer = setTimeout(()=>{autoRot=true;},ROTATE_DELAY); break;
    case 'ArrowRight': globeGroup.rotation.y += 0.1; camAnim = null; autoRot = false; if(rotTimer)clearTimeout(rotTimer); rotTimer = setTimeout(()=>{autoRot=true;},ROTATE_DELAY); break;
    case 'ArrowUp': globeGroup.rotation.x = Math.max(-Math.PI/2, globeGroup.rotation.x - 0.1); camAnim = null; break;
    case 'ArrowDown': globeGroup.rotation.x = Math.min(Math.PI/2, globeGroup.rotation.x + 0.1); camAnim = null; break;
    case '+': case '=': camera.position.z = Math.max(CAM_MIN, camera.position.z - 0.5); clearTimeout(rbTimer); rbTimer = setTimeout(rebuild, 200); break;
    case '-': case '_': camera.position.z = Math.min(CAM_MAX, camera.position.z + 0.5); clearTimeout(rbTimer); rbTimer = setTimeout(rebuild, 200); break;
  }
});

function showDealer(d) {

  const tc = TIER_COLORS[d.tier] || TIER_COLORS['Standard'];

  document.getElementById('dp-city').textContent = d.city;
  document.getElementById('dp-tier-dot').style.background = tc.css;
  document.getElementById('dp-tier-text').textContent = d.tier;

  const pl = document.getElementById('dp-platforms');
  pl.innerHTML = '';
  d.platforms.forEach(x => { const s = document.createElement('span'); s.className = 'plat-tag'; s.textContent = x; pl.appendChild(s); });

  const ct = document.getElementById('dp-contact');
  ct.innerHTML = '';
  if (d.address) ct.innerHTML += '<div class="contact-row"><span class="icon">&#128205;</span><span>' + escH(d.address) + '</span></div>';
  if (d.phone) ct.innerHTML += '<div class="contact-row"><span class="icon">&#128222;</span><span>' + escH(d.phone) + '</span></div>';
  if (d.email) ct.innerHTML += '<div class="contact-row"><span class="icon">&#9993;</span><a href="mailto:' + escH(d.email) + '">' + escH(d.email) + '</a></div>';

  const wb = document.getElementById('dp-website');
  if (d.website) { wb.href = d.website; wb.style.display = 'block'; } else { wb.style.display = 'none'; }

  // Wire up map button
  const mapBtn = document.getElementById('dp-map-btn');
  mapBtn.onclick = () => openMap(d);

  p.classList.add('open');
}

function closeDealer() { document.getElementById('dealer-panel').classList.remove('open'); }
document.getElementById('dp-close').addEventListener('click', closeDealer);

function showCluster(arr) {
  closeDealer();
  const p = document.getElementById('cluster-panel');
  document.getElementById('cp-title').textContent = arr.length + ' DEALERS';
  const l = document.getElementById('cp-list');
  l.innerHTML = '';
  [...arr].sort((a,b) => (TIER_COLORS[b.tier]?.priority||0) - (TIER_COLORS[a.tier]?.priority||0)).forEach(d => {
    const tc = TIER_COLORS[d.tier] || TIER_COLORS['Standard'];
    const el = document.createElement('div');
    el.className = 'dealer-item';
    el.innerHTML = '<span class="tier-dot" style="background:'+tc.css+'"></span><div><div>'+escH(d.name)+'</div><div class="item-city">'+escH(d.city)+'</div></div>';
    el.addEventListener('click', () => { closeCluster(); showDealer(d); });
    l.appendChild(el);
  });
  p.classList.add('open');
}

function closeCluster() { document.getElementById('cluster-panel').classList.remove('open'); }
document.getElementById('cp-close').addEventListener('click', closeCluster);

function closePanels() { closeDealer(); closeCluster(); }

// ── Full-screen map overlay ──
function openMap(d) {
  const overlay = document.getElementById('map-overlay');
  document.getElementById('map-title').textContent = d.name;
  document.getElementById('map-subtitle').textContent = d.city;
  const bbox = (d.lng-0.005) + ',' + (d.lat-0.004) + ',' + (d.lng+0.005) + ',' + (d.lat+0.004);
  document.getElementById('map-frame').innerHTML = '<iframe src="https://www.openstreetmap.org/export/embed.html?bbox=' + bbox.replace(/,/g, '%2C') + '&layer=mapnik&marker=' + d.lat + '%2C' + d.lng + '" allowfullscreen></iframe>';
  document.getElementById('map-link').href = 'https://www.openstreetmap.org/?mlat=' + d.lat + '&mlon=' + d.lng + '#map=17/' + d.lat + '/' + d.lng;
  overlay.classList.add('open');
}
function closeMap() {
  const overlay = document.getElementById('map-overlay');
  overlay.classList.remove('open');
  document.getElementById('map-frame').innerHTML = '';
}
document.getElementById('map-close').addEventListener('click', closeMap);

// ── Clock ──
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' +
    String(n.getMinutes()).padStart(2,'0') + ':' +
    String(n.getSeconds()).padStart(2,'0') + ' LOCAL';
}
setInterval(tick, 1000); tick();

// ── Resize ──
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Animate ──
let t = 0;
let frameCount = 0;

function frame() {
  requestAnimationFrame(frame);
  t += 0.016;
  frameCount++;

  if (autoRot && !camAnim) globeGroup.rotation.y += ROTATE_SPD;

  if (camAnim) {
    camAnim.p += 0.016;
    const dur = camAnim.dur || 1.0;
    const f = Math.min(camAnim.p / dur, 1);
    const e = easeIO(f);
    globeGroup.rotation.x = camAnim.sX + (camAnim.tX - camAnim.sX) * e;
    globeGroup.rotation.y = camAnim.sY + (camAnim.tY - camAnim.sY) * e;
    camera.position.z = camAnim.sD + (camAnim.tD - camAnim.sD) * e;
    if (f >= 1) {
      camAnim = null;
      // Rebuild after zoom animation to update clusters
      clearTimeout(rbTimer); rbTimer = setTimeout(rebuild, 100);
    }
  }

  if (cloudMesh) cloudMesh.rotation.y += 0.0003;

  // Update terminator sun direction once per second
  if (terminatorMesh && frameCount % 60 === 0) {
    terminatorMesh.material.uniforms.uSunDir.value.copy(getSunDirection());
  }

  // Pin pulse (subtler than before)
  pins.forEach(p => {
    const hov = p.mesh.userData._hovered;
    const base = hov ? DOT_SZ * 1.5 : DOT_SZ;
    const s = base * (1.0 + 0.25 * Math.sin(t * 2 + p.mesh.userData.phase));
    p.mesh.scale.set(s, s, 1);
  });

  // Cluster pulse
  clusters.forEach(c => {
    const bs = c.mesh.userData.bs;
    const s = bs * (1 + 0.15 * Math.sin(t * 1.2 + c.mesh.userData.phase));
    c.mesh.scale.set(s, s, 1);
  });

  renderer.render(scene, camera);
}

// ── Init ──
function init() {
  rebuild();
  setTimeout(() => {
    const ld = document.getElementById('loading');
    ld.classList.add('fade-out');
    setTimeout(() => ld.style.display = 'none', 600);
    // Intro zoom animation
    camAnim = {
      sX: 0, sY: 0, tX: 0, tY: 0,
      sD: CAM_MAX, tD: CAM_DEF, p: 0, dur: 2.0
    };
  }, 800);
  frame();
}

})();
</script>
